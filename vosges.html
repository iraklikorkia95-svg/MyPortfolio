<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vosges - Irakli Korkia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            color: #1a1a1a; 
            background-color: #fafafa; 
            overflow-x: hidden; 
        }
        
        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            z-index: 100;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.5s ease;
        }

        .nav-left {
            display: flex;
            align-items: center;
            min-width: 0; 
        }

        .nav-logo {
            font-weight: 600; 
            letter-spacing: 1px;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: #111;
            text-decoration: none; 
            flex-shrink: 0; 
        }

        .nav-gallery-title {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
            opacity: 0;
            max-width: 0;
            transform: translateY(15px);
            margin-left: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-gallery-title strong {
            color: #111;
            font-weight: 700;
            letter-spacing: 2px;
        }

        nav.scrolled .nav-gallery-title {
            opacity: 1;
            max-width: 1000px; 
            transform: translateY(0);
            margin-left: 15px; 
        }

        nav.scrolled .nav-gallery-title::before {
            content: "/";
            margin-right: 15px;
            color: #ccc;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-right > a, .dropdown > a {
            color: #333; 
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-left: 20px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .nav-right > a:hover, .dropdown > a:hover {
            opacity: 1;
        }

        /* --- DROPDOWN MENU --- */
        .dropdown {
            position: relative;
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: white;
            min-width: 180px;
            border-radius: 12px;
            padding: 10px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            margin-top: 15px;
        }

        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown-content a {
            display: block !important;
            margin: 0 !important;
            padding: 12px 25px !important;
            font-size: 0.85rem !important;
            color: #444 !important;
            text-decoration: none !important;
            opacity: 0.8 !important;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            letter-spacing: 0.5px !important;
            text-transform: none !important;
        }

        .dropdown-content a:hover {
            opacity: 1 !important;
            background: rgba(0, 0, 0, 0.03) !important;
            padding-left: 35px !important;
            color: #000 !important;
            letter-spacing: 1.2px !important;
        }

        /* Invisible bridge to keep menu open while moving cursor down */
        .dropdown::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 20px;
        }

        /* --- GALLERY HEADER --- */
        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 150px 40px 60px; 
            text-align: center; 
            transition: opacity 0.4s ease, transform 0.5s ease;
        }

        header.scrolled {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none; 
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            font-size: 3.5rem;
            color: #111;
        }

        p {
            color: #888; 
            font-size: 1.1rem;
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* --- GRID LAYOUT --- */
        .masonry-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 100px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-items: start;
        }

        @media (min-width: 1500px) {
            .masonry-grid { grid-template-columns: repeat(3, 1fr); max-width: 1600px; }
        }

        @media (max-width: 1024px) { 
            .masonry-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) { 
            .masonry-grid { grid-template-columns: 1fr; } 
        }

        .photo-item {
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer; 
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.04);
            opacity: 0;
            transform: scale(0.9) translateY(30px);
            transition: opacity 0.7s ease-out, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform;
        }

        .photo-item.is-visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Staggered Row Animation - 3 Columns */
        .photo-item:nth-child(3n+1) { transition-delay: 0s; }
        .photo-item:nth-child(3n+2) { transition-delay: 0.2s; }
        .photo-item:nth-child(3n+3) { transition-delay: 0.4s; }

        @media (max-width: 1024px) { 
            /* Reset 3-column delays and set for 2-columns */
            .photo-item:nth-child(n) { transition-delay: 0s; }
            .photo-item:nth-child(2n+1) { transition-delay: 0s; }
            .photo-item:nth-child(2n+2) { transition-delay: 0.2s; }
        }
        
        @media (max-width: 600px) { 
            /* Reset for 1-column (no stagger needed) */
            .photo-item:nth-child(n) { transition-delay: 0s; }
        }

        .photo-item img {
            width: 100%;
            height: auto; 
            display: block;
            transition: transform 0.6s ease, filter 0.4s ease;
            filter: brightness(0.95);
        }

        .photo-item:hover img {
            transform: scale(1.03);
            filter: brightness(1.05);
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(10, 10, 10, 0.98); 
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            overflow: hidden; 
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        #lightbox-track {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-slide {
            position: absolute;
            width: 58vw;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.5) translateX(0);
            pointer-events: none;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        opacity 0.7s ease, 
                        filter 0.7s ease;
        }

        .lightbox-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0px 10px 50px rgba(0,0,0,0.8);
        }

        #lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            opacity: 0.6;
            z-index: 1010; 
        }

        .lightbox-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            opacity: 0.3;
            z-index: 1010;
            padding: 40px 20px;
        }
        
        #lightbox-prev { left: 10px; }
        #lightbox-next { right: 10px; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <div class="nav-left">
            <a href="index.html" class="nav-logo">Irakli Korkia</a>
            <div class="nav-gallery-title"><strong>Vosges</strong> — Nature and tranquility in the mountains.</div>
        </div>
        <div class="nav-right">
            <div class="dropdown">
                <a href="index.html">Portfolios</a>
                <div class="dropdown-content">
                    <a href="strasbourg.html">Strasbourg</a>
                    <a href="corsica.html">Corsica</a>
                    <a href="vosges.html">Vosges</a>
                </div>
            </div>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <header id="main-header">
        <h1>Vosges</h1>
        <p>Nature and tranquility in the mountains.</p>
    </header>

    <div class="masonry-grid">
        <div class="photo-item"><img src="Vosges/DSCF6649.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF6686.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF6697.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF6778.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF8599.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF8615.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF8628.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF8716.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF8757.JPG" alt="Vosges Photography"></div>
        <div class="photo-item"><img src="Vosges/DSCF8779.JPG" alt="Vosges Photography"></div>
    </div>

    <div id="lightbox">
        <div id="lightbox-close">&times;</div>
        <div id="lightbox-prev" class="lightbox-nav-btn">&#10094;</div>
        <div id="lightbox-track"></div>
        <div id="lightbox-next" class="lightbox-nav-btn">&#10095;</div>
    </div>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            const header = document.getElementById('main-header');
            if (window.scrollY > 20) {
                nav.classList.add('scrolled');
                header.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
                header.classList.remove('scrolled');
            }
        });

        const photoObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                } else {
                    // keep animation consistent when scrolling up and down
                    entry.target.classList.remove('is-visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.photo-item').forEach((item) => {
            photoObserver.observe(item);
        });

        const lightbox = document.getElementById('lightbox');
        const track = document.getElementById('lightbox-track');
        const closeBtn = document.getElementById('lightbox-close');
        const galleryImages = document.querySelectorAll('.photo-item img');
        
        let currentIndex = 0;
        let isScrolling = false;
        let previousBodyOverflow = '';

        galleryImages.forEach((img, index) => {
            const slide = document.createElement('div');
            slide.className = 'lightbox-slide';
            slide.innerHTML = `<img src="${img.src}" alt="Vosges Gallery Photo">`;
            slide.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (currentIndex !== index) {
                    currentIndex = index;
                    updateInfiniteRoll();
                }
            });
            track.appendChild(slide);
        });

        const slides = document.querySelectorAll('.lightbox-slide');
        const totalSlides = slides.length;

        function updateInfiniteRoll() {
            slides.forEach((slide, i) => {
                let diff = i - currentIndex;
                if (diff < -Math.floor(totalSlides / 2)) diff += totalSlides;
                if (diff > Math.floor(totalSlides / 2)) diff -= totalSlides;

                if (diff === 0) {
                    slide.style.transform = 'translateX(0) scale(1)';
                    slide.style.opacity = '1';
                    slide.style.zIndex = '10';
                    slide.style.pointerEvents = 'auto'; 
                } else if (diff === 1) {
                    slide.style.transform = 'translateX(40vw) scale(0.35)';
                    slide.style.opacity = '0.35';
                    slide.style.zIndex = '5';
                    slide.style.pointerEvents = 'none';
                } else if (diff === -1) {
                    slide.style.transform = 'translateX(-40vw) scale(0.35)';
                    slide.style.opacity = '0.35';
                    slide.style.zIndex = '5';
                    slide.style.pointerEvents = 'none';
                } else {
                    let direction = diff > 0 ? 1 : -1;
                    slide.style.transform = `translateX(${direction * 80}vw) scale(0.2)`;
                    slide.style.opacity = '0';
                    slide.style.zIndex = '1';
                    slide.style.pointerEvents = 'none';
                }
            });
        }

        function nextSlide() { currentIndex = (currentIndex + 1) % totalSlides; updateInfiniteRoll(); }
        function prevSlide() { currentIndex = (currentIndex - 1 + totalSlides) % totalSlides; updateInfiniteRoll(); }
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = previousBodyOverflow || 'auto';
            previousBodyOverflow = '';
        }

        document.getElementById('lightbox-next').addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); });
        document.getElementById('lightbox-prev').addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); });

        galleryImages.forEach((img, index) => {
            img.addEventListener('click', () => {
                currentIndex = index;
                updateInfiniteRoll();
                lightbox.classList.add('active');

                previousBodyOverflow = document.body.style.overflow || '';
                document.body.style.overflow = 'hidden';
            });
        });

        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'Escape') closeLightbox();
        });

        lightbox.addEventListener('wheel', (e) => {
            if (!lightbox.classList.contains('active')) return;
            e.preventDefault(); 
            if (isScrolling) return;
            isScrolling = true;
            setTimeout(() => isScrolling = false, 500); 
            if (e.deltaY > 0 || e.deltaX > 0) nextSlide(); else prevSlide();
        }, { passive: false });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irakli Korkia Photography</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">

<style>

/* Global */
*, *::before, *::after { box-sizing: border-box; }

body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    color: #1a1a1a;
    overflow-x: hidden;
    background-color: #fafafa;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 5%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    transition: all 0.5s ease;
}

.nav-left { display: flex; align-items: center; }

.nav-logo {
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 1rem;
    text-transform: uppercase;
}

.nav-quote {
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    max-width: 0;
    margin-left: 0;
    transition: all 0.6s ease;
}

nav.scrolled .nav-quote {
    opacity: 1;
    max-width: 300px;
    margin-left: 15px;
}

nav.scrolled .nav-quote::before {
    content: "—";
    margin-right: 10px;
    color: #ccc;
}

.nav-right { display: flex; align-items: center; }

.nav-right > a, .dropdown > a {
    color: #333;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-left: 20px;
    opacity: 0.7;
    transition: 0.3s;
}

.nav-right > a:hover, .dropdown > a:hover { opacity: 1; }

/* DROPDOWN */
.dropdown { position: relative; }

.dropdown-content {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: white;
    min-width: 160px;
    border-radius: 12px;
    padding: 10px 0;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    opacity: 0;
    visibility: hidden;
    transition: 0.4s;
}

.dropdown:hover .dropdown-content {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
}

.dropdown-content a {
    display: block;
    padding: 10px 20px;
    font-size: 0.85rem;
    color: #444;
    text-decoration: none;
    opacity: 0.8;
}

.dropdown-content a:hover {
    opacity: 1;
    background: rgba(0,0,0,0.03);
    padding-left: 25px;
}

/* HEADER */
header {
    padding: 140px 5% 60px;
    text-align: center;
    transition: 0.4s;
}

header.scrolled {
    opacity: 0;
    transform: translateY(-20px);
}

h1 {
    font-weight: 200;
    letter-spacing: -1px;
    margin: 0;
    font-size: clamp(2rem, 8vw, 3.5rem);
}

header p {
    color: #666;
    font-size: clamp(1rem, 4vw, 1.2rem);
}

/* GRID */
.album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
    padding: 0 5% 100px;
    max-width: 1400px;
    margin: auto;
}

.album-cover {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    height: 450px;
    display: block;
    text-decoration: none;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    opacity: 0;
    transform: translateY(40px);
    transition: 0.6s;
}

.album-cover.is-visible {
    opacity: 1;
    transform: translateY(0);
}

.album-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) brightness(0.7);
    transition: 0.8s;
}

/* TITLE */
.album-title {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(1.5rem,5vw,3.5rem);
    width: 90%;
    text-align: center;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    -webkit-text-stroke: 1px rgba(255,255,255,0.5);
}

.album-cover:hover img {
    transform: scale(1.08);
    filter: grayscale(0%) brightness(0.4);
}

.album-cover:hover .album-title {
    color: rgba(255,255,255,0.9);
    -webkit-text-stroke: 0;
}

/* PARIS */
.paris-cover {
    background:
        linear-gradient(160deg, rgba(35,34,32,0.15), rgba(35,34,32,0.55)),
        radial-gradient(circle at top, rgba(255,236,210,0.55), transparent 35%),
        linear-gradient(135deg, #b8a48d, #7a8a92 55%, #414753);
}

/* TABLET */
@media (max-width:1024px){
    .album-grid { grid-template-columns: repeat(2,1fr); }
}

/* MOBILE FIX (THIS IS THE IMPORTANT PART) */
@media (max-width:768px){

    nav {
        padding: 8px 5%; /* smaller navbar */
    }

    .nav-logo {
        font-size: 0.8rem;
    }

    .nav-quote {
        display: none; /* removes extra height */
    }

    header {
        padding: 80px 5% 25px; /* prevents overlap with navbar */
    }

    .album-grid {
        grid-template-columns:1fr;
    }

    .album-cover {
        height:400px;
    }
}

/* VERY SMALL */
@media (max-width:400px){
    .nav-right { display:none; }
}

</style>
</head>

<body>

<nav id="main-nav">
    <div class="nav-left">
        <div class="nav-logo">Irakli Korkia</div>
        <div class="nav-quote">Exploring the world, one frame at a time</div>
    </div>
    <div class="nav-right">
        <div class="dropdown">
            <a href="#">Portfolios</a>
            <div class="dropdown-content">
                <a href="strasbourg.html">Strasbourg</a>
                <a href="paris.html">Paris</a>
                <a href="corsica.html">Corsica</a>
                <a href="vosges.html">Vosges</a>
            </div>
        </div>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>

<header id="main-header">
    <h1>Irakli Korkia Photography</h1>
    <p>Exploring the world, one frame at a time.</p>
</header>

<div class="album-grid">
    <a href="strasbourg.html" class="album-cover">
        <img src="images/strasbourg-cover.jpg">
        <div class="album-title">Strasbourg</div>
    </a>

    <a href="paris.html" class="album-cover paris-cover">
        <div class="album-title">Paris</div>
    </a>

    <a href="corsica.html" class="album-cover">
        <img src="images/corsica-cover.jpg">
        <div class="album-title">Corsica</div>
    </a>

    <a href="vosges.html" class="album-cover">
        <img src="images/Vosges.jpg">
        <div class="album-title">Vosges</div>
    </a>
</div>

<script>
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add('is-visible');
        }
    });
},{threshold:0.15});

document.querySelectorAll('.album-cover').forEach(el=>observer.observe(el));

window.addEventListener('scroll',()=>{
    const nav=document.getElementById('main-nav');
    const header=document.getElementById('main-header');

    if(window.scrollY>20){
        nav.classList.add('scrolled');
        header.classList.add('scrolled');
    } else {
        nav.classList.remove('scrolled');
        header.classList.remove('scrolled');
    }
});
</script>

</body>
</html>
